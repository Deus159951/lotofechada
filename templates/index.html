<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTO-FACIL FECHADA - PRIME PRINT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a192f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 50px 20px;
        }
        h1 {
            color: #3b82f6;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .btn-regras {
            background-color: #475569;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-regras:hover {
            background-color: #334155;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <h1>LOTO-FACIL FECHADA</h1>
        <p>PRIME PRINT</p>
        <p class="subtitle">Tecnologia Avançada de Análise e Gestão de Cotas da Lotofácil</p>
        <a href="#" class="btn-regras">📄 Ver Regras do Sistema</a>
    </header>

    <div class="container">
        <h2>🛒 Adquirir Cota(s) Oficial(ais)</h2>
        
        <div class="tab-nav">
            <button class="tab-btn">1. IDENTIFICAÇÃO</button>
            <button style="background-color: #334155;" class="tab-btn">2. ESCOLHA & PAGAMENTO</button>
        </div>

        <h3>Dados Gerais do Comprador</h3>
        
        <div class="form-group">
            <label for="nome">Nome Completo do Comprador:</label>
            <input type="text" id="nome" placeholder="Ex: João Silva Santos">
        </div>

        <div class="form-group">
            <label for="cpf">CPF do Comprador:</label>
            <input type="text" id="cpf" placeholder="Ex: 000.000.000-00">
        </div>
        
        <p style="font-size: 0.9rem; color: #94a3b8; text-align: right;">
            Já comprou antes? <a href="#" style="color: #60a5fa;">Entrar pelo Telefone</a>
        </p>
    </div>

</body>
</html>
