<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME PRINT - Pagamento Pix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-pix { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); background: #fff; max-width: 500px; margin: auto; }
        .btn-copiar { background-color: #009ee3; color: white; border: none; font-weight: bold; }
        .btn-copiar:hover { background-color: #007bb5; color: white; }
        .qr-box img { max-width: 220px; border: 4px solid #f0f0f0; border-radius: 10px; }
        .loader-dots span { width: 8px; height: 8px; margin: 0 3px; background: #2b8a3e; display: inline-block; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="card-pix p-4 text-center">
            <h2 class="h4 fw-bold text-dark mb-1">Finalize seu Pagamento</h2>
            <p class="text-muted small">Pague via Pix para garantir as suas cotas de forma automática</p>
            
            <div class="alert alert-light border text-dark py-2 my-3">
                <span class="d-block small text-muted">VALOR TOTAL A PAGAR</span>
                <strong class="fs-3 text-success">R$ {{ "%.2f"|format(valor) }}</strong>
            </div>

            <div class="qr-box my-4">
                <img src="data:image/jpeg;base64,{{ pix_qr }}" alt="QR Code Pix">
            </div>

            <p class="text-dark small mb-2 fw-bold">Ou pague copiando o código abaixo:</p>
            <div class="input-group mb-3">
                <input type="text" id="pixCode" class="form-control text-truncate bg-light" value="{{ pix_code }}" readonly>
                <button class="btn btn-copiar" type="button" onclick="copiarPix()">Copiar Código</button>
            </div>

            <div class="mt-4 p-3 bg-light rounded d-flex align-items-center justify-content-center gap-2">
                <div class="loader-dots">
                    <span></span><span></span><span></span>
                </div>
                <span class="text-muted small fw-bold">Aguardando confirmação do pagamento...</span>
            </div>
            
            <p class="text-muted small mt-3 mb-0">Assim que você pagar no aplicativo do seu banco, esta página atualizará sozinha.</p>
        </div>
    </div>

    <script>
        function copiarPix() {
            var copyText = document.getElementById("pixCode");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("✅ Código Pix copiado com sucesso! Abra o app do seu banco e use a opção Pix Copia e Cola.");
        }

        // Salva os dados do cliente no navegador para manter o botão "Ver Minhas Combinações" ativo
        localStorage.setItem('primeprint_nome', '{{ nome }}');
        localStorage.setItem('primeprint_contato', '{{ contato }}');

        // Loop inteligente: Verifica a cada 3 segundos se o Mercado Pago deu baixa no pagamento
        setInterval(function() {
            fetch('/checar_status_pagamento/{{ payment_id }}')
            .then(res => res.json())
            .then(data => {
                if (data.pago) {
                    alert("🎉 Pagamento confirmado com sucesso! Suas cotas já estão garantidas.");
                    window.location.href = "/";
                }
            });
        }, 3000);
    </script>
</body>
</html>
